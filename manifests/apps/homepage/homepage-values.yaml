# Homepage — dashboard del homelab
# Chart: https://github.com/jameswynn/helm-charts

image:
  repository: ghcr.io/gethomepage/homepage
  tag: v1.2.0

# Permitir leer el API de Kubernetes para el widget kubernetes
enableRbac: true
serviceAccount:
  create: true

# Variable que el chart espera para detectar el host
env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "*"

# Carga las credenciales de servicios externos (Proxmox, ArgoCD, Grafana...)
# El Secret se crea manualmente: kubectl -n homepage create secret generic
# homepage-credentials --from-literal=HOMEPAGE_VAR_PROXMOX_TOKEN_ID=...
envFrom:
  - secretRef:
      name: homepage-credentials

# Service (estructura bjw-s common library del chart 2.x)
service:
  main:
    ports:
      http:
        port: 3000

# Recursos modestos
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# Config inline (el chart la convierte en ConfigMaps montados)
config:
  # ---------------- bookmarks ----------------
  bookmarks:
    - Developer:
        - GitHub:
            - abbr: GH
              href: https://github.com/Juanluiso
    - Docs:
        - Kubernetes:
            - abbr: K8s
              href: https://kubernetes.io/docs/
        - OpenTofu:
            - abbr: TF
              href: https://opentofu.org/docs/
        - ArgoCD:
            - abbr: AC
              href: https://argo-cd.readthedocs.io/

  # ---------------- services ----------------
  services:
    - "Infraestructura":
        - Proxmox:
            href: https://192.168.1.10:8006
            description: Hipervisor (6 cores · 16 GB RAM)
            icon: proxmox.svg
            widget:
              type: proxmox
              url: https://192.168.1.10:8006
              username: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_ID}}"
              password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET}}"
              node: proxmox

        - ArgoCD:
            href: https://argocd-server.argocd.svc.cluster.local
            description: GitOps controller
            icon: argocd.svg
            widget:
              type: argocd
              url: https://argocd-server.argocd.svc.cluster.local
              # API token de la cuenta local 'homepage' (read-only).
              # Generado vía /api/v1/account/homepage/token con admin.
              key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"

        - Grafana:
            href: http://kps-grafana.monitoring.svc.cluster.local
            description: Dashboards de métricas y logs
            icon: grafana.svg
            widget:
              type: grafana
              url: http://kps-grafana.monitoring.svc.cluster.local
              username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"

        - Prometheus:
            href: http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            description: Métricas en tiempo real
            icon: prometheus.svg
            widget:
              type: prometheus
              url: http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090

    - "Apps":
        - nginx-demo:
            href: http://nginx-demo.nginx-demo.svc.cluster.local
            description: Demo desplegado vía GitOps
            icon: nginx.svg

    - "Externos":
        - CV:
            href: https://cv.juamluisms.workers.dev
            description: Mi landing personal
            icon: si-aboutdotme
        - Rajoyle:
            href: https://rajoyle.juamluisms.workers.dev
            description: Juego diario en Cloudflare Workers
            icon: si-cloudflare

  # ---------------- widgets superiores ----------------
  widgets:
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
        label: cluster
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: full
          timeStyle: short
          hour12: false
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "k3s-homelab"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  # ---------------- settings ----------------
  settings:
    title: "Juanlu — Homelab"
    favicon: https://www.svgrepo.com/show/376344/server.svg
    headerStyle: clean
    target: _blank
    statusStyle: dot
    theme: dark
    color: slate
    iconStyle: theme
    fiveColumns: true
    layout:
      "Infraestructura":
        style: row
        columns: 4
      "Apps":
        style: row
        columns: 4
      "Externos":
        style: row
        columns: 4

  # ---------------- kubernetes integration ----------------
  kubernetes:
    mode: cluster
