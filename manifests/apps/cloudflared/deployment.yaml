# Cloudflared en modo "Quick Tunnel" — sin dominio.
# Cada reinicio del pod = URL pública nueva en *.trycloudflare.com.
# Para una URL persistente y bonita, hace falta dominio + named tunnel.
#
# Uso típico:
#   1. kubectl -n cloudflared logs deploy/cloudflared | grep trycloudflare.com
#   2. Compartir la URL que aparece (válida hasta el próximo restart del pod).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.10.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            # Apuntamos al Homepage (cara del homelab)
            - --url
            - http://homepage.homepage.svc.cluster.local:3000
          ports:
            - name: metrics
              containerPort: 2000
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
