apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Juanluiso/homelab.git
    targetRevision: main
    path: manifests/apps/uptime-kuma
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime-kuma
  syncPolicy:
    automated:
      prune: false       # protege el PVC contra borrado accidental
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
