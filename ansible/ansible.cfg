[defaults]
inventory             = ./inventory.yml
host_key_checking     = False
stdout_callback       = yaml
gathering             = smart
forks                 = 5
retry_files_enabled   = False
deprecation_warnings  = False

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null
