---
# Instala k3s en modo agent (worker) y se une al cluster.
# Necesita que el role k3s_server haya corrido antes
# (para tener el k3s_node_token disponible).

- name: Recuperar token del master
  ansible.builtin.set_fact:
    k3s_token: "{{ hostvars[groups['k3s_server'][0]].k3s_node_token }}"
  no_log: true
  when: hostvars[groups['k3s_server'][0]].k3s_node_token is defined

- name: Fallar si no tenemos token
  ansible.builtin.fail:
    msg: "No se ha obtenido el token del master. Lanza el playbook entero, no solo este rol."
  when: k3s_token is not defined

- name: Comprobar si k3s-agent ya está instalado
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary_agent

- name: Instalar k3s agent (solo si no está)
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL="https://{{ k3s_server_ip }}:{{ k3s_server_port }}" \
      K3S_TOKEN="{{ k3s_token }}" \
      sh -
  args:
    executable: /bin/bash
  when: not k3s_binary_agent.stat.exists
  register: agent_install
  changed_when: agent_install.rc == 0
  no_log: true   # el token está en la línea de comando

- name: Asegurar que k3s-agent está activo
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true

- name: Esperar a que el nodo esté Ready desde el master
  delegate_to: "{{ groups['k3s_server'][0] }}"
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: node_ready
  retries: 30
  delay: 4
  until: node_ready.stdout == "True"
  changed_when: false
